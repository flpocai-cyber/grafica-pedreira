name: Deploy Locaweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare IIS config files
        run: |
          cp dist/index.html dist/default.htm
          cp public/web.config dist/web.config
          echo "=== Arquivos no dist/ ==="
          ls -la dist/
          echo "=== Conteúdo do web.config ==="
          cat dist/web.config

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Locaweb FTP
        env:
          FTP_HOST: ${{ secrets.HOST }}
          FTP_USER: ${{ secrets.USER }}
          FTP_PASS: ${{ secrets.PASS }}
        run: |
          FTP_USER_ESCAPED=$(printf '%s' "$FTP_USER" | sed 's/\\/\\\\/g; s/"/\\"/g')
          FTP_PASS_ESCAPED=$(printf '%s' "$FTP_PASS" | sed 's/\\/\\\\/g; s/"/\\"/g')

          lftp -c "
            set ftp:ssl-allow no
            set ssl:verify-certificate no
            set net:max-retries 3
            set net:timeout 30
            set xfer:clobber on
            open $FTP_HOST
            user $FTP_USER_ESCAPED $FTP_PASS_ESCAPED
            echo '=== Pasta raiz FTP ==='
            pwd
            echo '=== Subindo arquivos para Web/ ==='
            mirror --reverse --verbose --no-perms --parallel=4 dist/ Web/
            echo '=== Deploy concluído! Conteúdo final de Web/ ==='
            ls -la Web/
            bye
          "

