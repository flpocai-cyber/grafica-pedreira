name: Deploy Locaweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Locaweb FTP
        env:
          FTP_HOST: ${{ secrets.HOST }}
          FTP_USER: ${{ secrets.USER }}
          FTP_PASS: ${{ secrets.PASS }}
        run: |
          lftp "$FTP_HOST" -u "$FTP_USER","$FTP_PASS" -e "
          set ftp:ssl-allow no;
          set ssl:verify-certificate no;
          set net:max-retries 2;
          set net:timeout 20;
          set xfer:clobber on;
          mirror -R --delete --verbose dist .;
          bye
          "
