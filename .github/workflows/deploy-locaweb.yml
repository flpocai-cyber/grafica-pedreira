name: Deploy Locaweb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare IIS default document fallback
        run: cp dist/index.html dist/default.htm

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to Locaweb FTP
        env:
          FTP_HOST: ${{ secrets.HOST }}
          FTP_USER: ${{ secrets.USER }}
          FTP_PASS: ${{ secrets.PASS }}
        run: |
          FTP_USER_ESCAPED=$(printf '%s' "$FTP_USER" | sed 's/\\/\\\\/g; s/"/\\"/g')
          FTP_PASS_ESCAPED=$(printf '%s' "$FTP_PASS" | sed 's/\\/\\\\/g; s/"/\\"/g')

          {
            echo 'set ftp:ssl-allow no'
            echo 'set ssl:verify-certificate no'
            echo 'set net:max-retries 2'
            echo 'set net:timeout 20'
            echo 'set xfer:clobber on'
            echo 'open "'"$FTP_HOST"'"'
            echo 'user "'"$FTP_USER_ESCAPED"'" "'"$FTP_PASS_ESCAPED"'"'
            echo 'rm -r "Web"'
            echo 'rm "web.config"'

            find dist -type d | while read -r dir; do
              remote_dir="${dir#dist}"
              remote_dir="${remote_dir#/}"

              if [ -n "$remote_dir" ]; then
                echo 'mkdir -p "'"$remote_dir"'"'
              fi
            done

            find dist -type f | while read -r file; do
              remote_dir=$(dirname "${file#dist/}")

              if [ "$remote_dir" = "." ]; then
                echo 'put "'"$file"'" -o "'"$(basename "$file")"'"'
              else
                echo 'put "'"$file"'" -o "'"$remote_dir/$(basename "$file")"'"'
              fi
            done

            echo 'bye'
          } > deploy.lftp

          lftp -f deploy.lftp
